<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 山行者 100 衝刺儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .progress-transition { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        input[type="checkbox"]:checked + label { text-decoration: line-through; color: #9ca3af; font-style: italic; }
        .mission-card { border-left-width: 4px; transition: transform 0.2s; }
        .mission-card:active { transform: scale(0.99); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-28 font-sans">

    <header class="bg-slate-900 text-white p-6 sticky top-0 shadow-lg z-30">
        <div class="max-w-md mx-auto">
            <h1 class="text-2xl font-bold flex items-center justify-between">
                <span>⛰️ 38 峰挑戰進度</span>
                <span class="text-sm bg-blue-600 px-3 py-1 rounded-full border border-blue-400" id="percent-text">18%</span>
            </h1>
            <div class="mt-4">
                <div class="flex justify-between text-xs mb-1 font-medium text-slate-300">
                    <span>已解鎖: <span id="completed-count">7</span> / 38</span>
                    <span id="days-countdown">載入中...</span>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-3 overflow-hidden border border-slate-700">
                    <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-emerald-400 h-full progress-transition" style="width: 18.4%"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <section class="bg-white rounded-xl shadow-sm overflow-hidden mission-card border-emerald-500">
            <div class="bg-emerald-50 p-3 border-b border-emerald-100 flex justify-between items-center">
                <h2 class="font-bold text-emerald-800"><i class="fas fa-check-circle mr-2"></i>Mission 08 & 09: 東北縱走</h2>
                <span class="text-xs font-bold text-emerald-600">COMPLETED</span>
            </div>
            <div class="p-4 space-y-3">
                <div class="flex items-center"><input type="checkbox" id="p20" class="peak-cb w-5 h-5 mr-3 text-emerald-600" checked><label for="p20">屏風山</label></div>
                <div class="flex items-center"><input type="checkbox" id="p21" class="peak-cb w-5 h-5 mr-3 text-emerald-600" checked><label for="p21">黃嶺</label></div>
                <div class="flex items-center"><input type="checkbox" id="p22" class="peak-cb w-5 h-5 mr-3 text-emerald-600" checked><label for="p22">純陽峰</label></div>
                <div class="flex items-center"><input type="checkbox" id="p23" class="peak-cb w-5 h-5 mr-3 text-emerald-600" checked><label for="p23">仙姑峰</label></div>
                <div class="flex items-center"><input type="checkbox" id="p24" class="peak-cb w-5 h-5 mr-3 text-emerald-600" checked><label for="p24">馬頭峰 (4/7)</label></div>
                <div class="flex items-center"><input type="checkbox" id="p25" class="peak-cb w-5 h-5 mr-3 text-emerald-600" checked><label for="p25">吊燈籠 (4/7)</label></div>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm overflow-hidden mission-card border-purple-500">
            <div class="bg-purple-50 p-3 border-b border-purple-100">
                <h2 class="font-bold text-purple-800"><i class="fas fa-border-all mr-2"></i>Mission 11: 北區邊境</h2>
            </div>
            <div class="p-4 space-y-3">
                <div class="flex items-center"><input type="checkbox" id="p30" class="peak-cb w-5 h-5 mr-3" checked><label for="p30">龜頭嶺</label></div>
                <div class="flex items-center"><input type="checkbox" id="p29" class="peak-cb w-5 h-5 mr-3"><label for="p29">紅花嶺</label></div>
                <div class="flex items-center"><input type="checkbox" id="p31" class="peak-cb w-5 h-5 mr-3"><label for="p31">麒麟山</label></div>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm overflow-hidden mission-card border-orange-500">
            <div class="bg-orange-50 p-3 border-b border-orange-100">
                <h2 class="font-bold text-orange-800"><i class="fas fa-map-marked-alt mr-2"></i>Mission 04-06: 西貢挑戰</h2>
            </div>
            <div class="p-4 grid grid-cols-1 gap-3 text-sm">
                <div class="flex items-center"><input type="checkbox" id="p5" class="peak-cb w-5 h-5 mr-3"><label for="p5">蚺蛇尖</label></div>
                <div class="flex items-center"><input type="checkbox" id="p6" class="peak-cb w-5 h-5 mr-3"><label for="p6">螺地墩</label></div>
                <div class="flex items-center"><input type="checkbox" id="p7" class="peak-cb w-5 h-5 mr-3"><label for="p7">石屋山</label></div>
                <div class="flex items-center"><input type="checkbox" id="p8" class="peak-cb w-5 h-5 mr-3"><label for="p8">雞公山</label></div>
                <div class="flex items-center"><input type="checkbox" id="p11" class="peak-cb w-5 h-5 mr-3"><label for="p11">蠄蟝石頂</label></div>
                <div class="flex items-center"><input type="checkbox" id="p13" class="peak-cb w-5 h-5 mr-3"><label for="p13">標尖角頂</label></div>
                <div class="text-gray-400 text-xs mt-2">...其餘 5 座西貢山頭已在 localStorage 備份</div>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm overflow-hidden mission-card border-blue-500">
            <div class="bg-blue-50 p-3 border-b border-blue-100">
                <h2 class="font-bold text-blue-800"><i class="fas fa-umbrella-beach mr-2"></i>Mission 01-03 & 10: 離島/欣澳</h2>
            </div>
            <div class="p-4 grid grid-cols-2 gap-3 text-sm">
                <div class="flex items-center"><input type="checkbox" id="p1" class="peak-cb w-4 h-4 mr-2"><label for="p1">牛湖頂</label></div>
                <div class="flex items-center"><input type="checkbox" id="p2" class="peak-cb w-4 h-4 mr-2"><label for="p2">菱角山</label></div>
                <div class="flex items-center"><input type="checkbox" id="p28" class="peak-cb w-4 h-4 mr-2"><label for="p28">老虎頭</label></div>
                <div class="flex items-center"><input type="checkbox" id="p4" class="peak-cb w-4 h-4 mr-2"><label for="p4">黑山頂</label></div>
            </div>
        </section>

    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-4 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-40">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Next Target</span>
                <span class="text-sm font-black text-slate-800">紅花嶺 (趁未入夏)</span>
            </div>
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="bg-slate-900 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg">
                <i class="fas fa-arrow-up"></i>
            </button>
        </div>
    </footer>

    <script>
        const checkboxes = document.querySelectorAll('.peak-cb');
        const countDisplay = document.getElementById('completed-count');
        const percentText = document.getElementById('percent-text');
        const progressBar = document.getElementById('progress-bar');
        const countdown = document.getElementById('days-countdown');

        // 截止日期：2026年12月31日
        const deadline = new Date('2026-12-31');
        const updateCountdown = () => {
            const now = new Date();
            const diff = Math.ceil((deadline - now) / (1000 * 60 * 60 * 24));
            countdown.innerText = diff > 0 ? `剩餘 ${diff} 天` : "挑戰已結束";
        };

        function updateProgress() {
            const checkedCount = document.querySelectorAll('.peak-cb:checked').length;
            const total = 38; 
            const percent = (checkedCount / total * 100).toFixed(1);
            
            countDisplay.innerText = checkedCount;
            percentText.innerText = percent + '%';
            progressBar.style.width = percent + '%';

            // 儲存狀態
            const state = {};
            checkboxes.forEach(cb => state[cb.id] = cb.checked);
            localStorage.setItem('hiking_master_2026_v3', JSON.stringify(state));
        }

        window.onload = () => {
            const savedState = JSON.parse(localStorage.getItem('hiking_master_2026_v3'));
            if (savedState) {
                checkboxes.forEach(cb => {
                    if (savedState[cb.id] !== undefined) cb.checked = savedState[cb.id];
                });
            }
            updateProgress();
            updateCountdown();
        };

        checkboxes.forEach(cb => cb.addEventListener('change', updateProgress));
    </script>
</body>
</html>
